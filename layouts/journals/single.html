{{ define "main" }}
{{ if .Params.photo }}
<section class="hero cinematic-hero" style="min-height: 70vh;">
    <div class="hero-bg" style="background-image: url('{{ .Params.photo | relURL }}');">
    </div>
    <div class="hero-overlay-dark"></div>
    <div class="hero-content fade-in-up mt-large" style="padding-top: 4rem;">
        <span class="hero-kicker" style="border-color: rgba(255,255,255,0.4);">Journal Entry</span>
        <h1 class="hero-title" style="color: var(--color-ivory);">{{ .Title }}</h1>
    </div>
</section>
{{ end }}

<section class="section bg-ivory">
    <div class="container fade-in-up" style="max-width: 800px;">
        {{ if not .Params.photo }}
        <div style="margin-bottom: 3rem; text-align: center;">
            <span class="hero-kicker" style="border-color: var(--color-stone); color: var(--color-text-muted);">Journal Entry</span>
            <h1 class="serif-title" style="font-size: 3rem; margin-top: 1rem; margin-bottom: 0.5rem; color: var(--color-forest);">{{ .Title }}</h1>
        </div>
        {{ end }}
        
        <article class="editorial-content">
            {{ .Content }}
        </article>
        
        <div style="margin-top: 4rem; text-align: center; border-top: 1px solid var(--color-stone); padding-top: 3rem;">
            <a href="{{ "/journals/" | relURL }}" class="btn-primary light" style="background-color: transparent; border: 1px solid var(--color-forest); color: var(--color-forest);">
                &larr; Back to Journals
            </a>
        </div>
    </div>
</section>
{{ end }}
